general {
    gaps_in            = 5
    gaps_out           = 12
    border_size        = 2
    col.active_border  = rgba(3dd9a0ee) rgba(60c8f0ee) 45deg
    col.inactive_border = rgba(2a304866)
    layout             = dwindle
}

decoration {
    rounding         = 10
    active_opacity   = 1.0
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        noise             = 0.02
        contrast          = 0.9
        brightness        = 0.85
        new_optimizations = true
    }

    shadow {
        enabled        = true
        range          = 20
        render_power   = 3
        color          = rgba(3dd9a040)
        color_inactive = rgba(1e242400)
    }
}

animations {
    enabled = true

    bezier = spark,   0.05, 0.9,  0.1,  1.05
    bezier = smooth,  0.25, 0.1,  0.25, 1.0
    bezier = swift,   0.4,  0.0,  0.2,  1.0
    bezier = flicker, 0.2,  0.8,  0.2,  1.0

    animation = windows,          1, 4,  spark,   slide
    animation = windowsOut,       1, 3,  smooth,  popin 80%
    animation = windowsMove,      1, 4,  swift
    animation = fade,             1, 5,  smooth
    animation = fadeIn,           1, 4,  smooth
    animation = fadeOut,          1, 3,  smooth
    animation = workspaces,       1, 4,  flicker, slidevert
    animation = specialWorkspace, 1, 4,  swift,   fade
    animation = border,           1, 8,  smooth
    animation = borderangle,      1, 18, smooth,  loop
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    animate_manual_resizes   = true
    animate_mouse_windowdragging = true
    enable_swallow           = true
    swallow_regex            = ^(alacritty|kitty|foot)$
}

input {
    resize_on_border  = true
    follow_mouse      = 1
    float_switch_override_focus = 2
}

dwindle {
    pseudotile        = true
    preserve_split    = true
    smart_split       = true
}
